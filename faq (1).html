<!DOCTYPE html>
<html>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<style>
html {
	background: linear-gradient(to bottom, darkcyan, DodgerBlue);
	width: 100%;
	min-height: 100vh;
	margin: 0;
	padding: 0;
	background-attachment: fixed; 

}



.bck
{
	width:auto;
}
.p
{
	width: 70px;
	height: 100vh;
	border-style: solid;
	border-color:lightskyblue;
	position: absolute;
	background-image: url("https://www.hallmarknameplate.com/wp-content/uploads/2018/12/AdobeStock_4381957.jpeg");
	background-color: palegreen;
	background-blend-mode: multiply;
	opacity: .65;

}
.g
{
	width: 80px;
	height: 100vh;
	background: linear-gradient(to bottom, palegreen, lightgreen);
	position: absolute;
	opacity: .25;

}

#p1
{
	left:16%;
}

#p2
{
	left:32%;
}
#p3
{
	left:65%;
}
#p4
{
	left:84%;
}

.headingBox
{
	border-radius: 25px;
	padding: 20px;
	height: 250px;
	width: 800px;
	background-color:orange;
	position:absolute;
	top: -100px;
	z-index:1;
}

.qBox
{
	border-radius: 25px;
	padding: 20px;
	height: 100px;
	width: 400px;
	background-color:darkred;
	position:absolute;
	top: 40%;
	z-index:1;
}

.aBox
{
	border-radius: 25px;
	padding: 20px;
	height: 600px;
	width: 400px;
	background-color:rgb(255, 151, 76);
	position:absolute;
	top: 48%;
	z-index:1;
}

.mid
{
	display: flex;
	allign-items: center;
	justify-content: center;
	
}


.right
{

	display:flex;
	allign-items: right;
	justify-content: right;
	
}

</style>
</head>




<body>

<div class=bck> 
	<div class=mid>
		<div class=headingBox></div>
		<div class=qBox>"Hi"</div>
		<div class="aBox"></div>
	</div>

	<div class=left>
		<div class=qBox>"Hi"</div>
		<div class="aBox"></div>
	</div>

	<div class=right>
		<div class=qBox>"Hi"</div>
		<div class="aBox"></div>



	<div>
		<div class=p id=p1></div>
		<div class=p id=p2></div>
		<div class=p id=p3></div>
		<div class=p id=p4></div>

		<div class=g id=p1></div>
		<div class=g id=p2></div>
		<div class=g id=p3></div>
		<div class=g id=p4></div>
	</div>
</div>



</body>

</html>
