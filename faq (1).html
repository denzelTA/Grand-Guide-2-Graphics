<!DOCTYPE html>
<html>
<head>
<style>
html {
	background: linear-gradient(to bottom, darkcyan, DodgerBlue);
	height: 100%;
	width: 100%;
	background-repeat: no-repeat;
	background-attachment: fixed; 

}

.p
{
	width: 70px;
	height: 1000px;
	border-style: solid;
	border-color:lightskyblue;
	position: absolute;
	background-image: url("https://www.hallmarknameplate.com/wp-content/uploads/2018/12/AdobeStock_4381957.jpeg");
	background-color: palegreen;
	background-blend-mode: multiply;
	opacity: .65;

}
.g
{
	width: 80px;
	height: 1000px;
	background: linear-gradient(to bottom, palegreen, lightgreen);
	position: absolute;
	opacity: .25;

}

#p1
{
	left:16%;
}

#p2
{
	left:32%;
}
#p3
{
	left:65%;
}
#p4
{
	left:84%;
}

.headingBox
{
	border-radius: 25px;
	padding: 20px;
	height: 250px;
	width: 800px;
	background-color:orange;
	position:absolute;
	top: -100px;
	z-index:1;
}

.qBox
{
	border-radius: 25px;
	padding: 20px;
	height: 100px;
	width: 400px;
	background-color:darkred;
	position:absolute;
	top: 40%;
	z-index:1;
}

.mid
{
	display: flex;
	allign-items: center;
	justify-content: center;
	
}

.left
{
	display:flex;
	allign-items: left;
	justify-content: left;

}

.right
{

	display:flex;
	allign-items: right;
	justify-content: right;
	
}

</style>
</head>




<body>


<div class=mid>
	<div class=headingBox></div>
	<div class=qBox></div>
</div>

<div class=left>
	<div class=qBox></div>
</div>

<div class=right>
	<div class=qBox></div>



<div>
	<div class=p id=p1></div>
	<div class=p id=p2></div>
	<div class=p id=p3></div>
	<div class=p id=p4></div>

	<div class=g id=p1></div>
	<div class=g id=p2></div>
	<div class=g id=p3></div>
	<div class=g id=p4></div>
</div>




</body>
</html>
